# AMBF Version: (0.1)
bodies: []
joints: []
cameras: [stereoLR]
high resolution path: ./high_res/
low resolution path: ./low_res/
ignore inter-collision: false
namespace: /ambf/env/

extraVirtual:
  namespace: cameras/
  name: extraVirtual 
  location: {x: 0.0, y: 0.0, z: 0.0}
  look at: {x: -1.0, y: 0.0, z: 0.0}
  up: {x: 0.0, y: 0.0, z: 1.0}
  clipping plane: { near: 0.2, far: 1006.7654639175257 }
  field view angle: 0.17951634837990105
  monitor: 0
  mouse control multipliers: {pan: 0.1, rotate: 0.1, scroll: 0.1, arcball: 0.1}
  # stereo: {mode: Passive, eye separation: 0.15, focal length: 200} # Virtual cam doesn't need to be stereo.
  # multipass: true
  publish image: true
  # preprocessing shaders:
  #   path: ../../../ambf_shaders/preprocessing/
  #   vertex: shader.vs
  #   fragment: shader.fs
  # publish image interval: 5   # Publish every nth scene update
  # publish depth: true
  # publish depth noise: {mean: 0.1, std_dev: 0.01, bias: 0.0}
  # publish depth interval: 1 # Publish every nth scene update
  publish image resolution: {width: 960, height: 540}
  # depth compute shaders:
  #    path: ../../../ambf_shaders/depth
  #    vertex: shader.vs
  #    fragment: shader.fs
  parent: main_camera

stereoLR:
  namespace: cameras/
  name: stereoLR
  location: {x: 0.0, y: 0.0, z: 0.0}
  look at: {x: -1.0, y: 0.0, z: 0.0}
  up: {x: 0.0, y: 0.0, z: 1.0}
  clipping plane: { near: 0.2, far: 1006.7654639175257 }
  field view angle: 0.17951634837990105
  monitor: 0
  mouse control multipliers: {pan: 0.1, rotate: 0.1, scroll: 0.1, arcball: 0.1}
  # stereo: {mode: Passive, eye separation: 0.15, focal length: 200} # Virtual cam doesn't need to be stereo.
  # multipass: true
  # publish image: true
  # preprocessing shaders:
  #   path: ../../../ambf_shaders/preprocessing/
  #   vertex: shader.vs
  #   fragment: shader.fs
  # publish image interval: 5   # Publish every nth scene update
  # publish depth: true
  # publish depth noise: {mean: 0.1, std_dev: 0.01, bias: 0.0}
  # publish depth interval: 1 # Publish every nth scene update
  # publish image resolution: {width: 640, height: 480}
  # depth compute shaders:
  #    path: ../../../ambf_shaders/depth
  #    vertex: shader.vs
  #    fragment: shader.fs
  parent: main_camera
  plugins: [
    ## multiview_plugin renders to frame buffer.
    ## sim_assisted_nav_plugin takes the image from frame buffer and adds it to the main camera image 
    {
        name: multiview_plugin,
        path: "../build",
        filename: "libmultiview.so",
        layout: custom field to be parsed in the future by the plugin. 
    },
    {
      name: sim_assisted_nav_plugin,
      path: "../build",
      filename: "libsim_assisted_nav.so",
    },
  ]

  multiview_plugin_config:
    render_to_frame_buffer: true

  # sim_assisted_nav_plugin_config: # AMBF stereo camera - this requires `stereo_cameras.yaml`
  #   left_rostopic: /ambf/env/cameras/stereoL/ImageData
  #   right_rostopic: /ambf/env/cameras/stereoR/ImageData
  #   format: RGB # RGB or RGBA
  #   color_conversion: false 

  # sim_assisted_nav_plugin_config: # ZED mini 
  #   left_rostopic: /zedm/zed_node/left/image_rect_color/compressed
  #   right_rostopic: /zedm/zed_node/right/image_rect_color/compressed
  #   format: RGB
  #   color_conversion: true 

  # sim_assisted_nav_plugin_config: # ZED mini 
  #   left_rostopic: /zedm/zed_node/left/image_rect_color
  #   right_rostopic: /zedm/zed_node/right/image_rect_color
  #   format: RGB
  #   color_conversion: true 

  sim_assisted_nav_plugin_config: # Mock OR microscope 
    left_rostopic: /decklink_left/camera/image_raw/compressed
    right_rostopic: /decklink_right/camera/image_raw/compressed
    format: RGB
    color_conversion: true 

  # sim_assisted_nav_plugin_config: # Mock OR microscope 
  #   left_rostopic: /decklink_left/camera/image_raw
  #   right_rostopic: /decklink_right/camera/image_raw
  #   format: RGB
  #   color_conversion: false 
   
