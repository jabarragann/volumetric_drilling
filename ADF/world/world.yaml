enclosure size: { length: 10.0, width: 10.0, height: 3.0 }
lights: [light1]
cameras: [main_camera]
# cameras: [main_camera, cameraL, cameraR]
environment: ./checkered_floor.yaml
namespace: /ambf/env/
max iterations: 50
gravity: { x: 0.0, y: 0.0, z: -0.0 }
conversion factor: 0.049664
# shaders:
#   path: ../../ambf_shaders/normal_map
#   vertex: shader.vs
#   fragment: shader.fs

light1:
  namespace: lights/
  name: light1
  location: { x: 0.0, y: 0.0, z: 0.25 }
  direction: { x: -1.0, y: 0.0, z: 0.0 }
  spot exponent: 0.3
  shadow quality: 5
  cutoff angle: 0.5
  parent: main_camera

light2:
  namespace: lights/
  name: light2
  location: { x: -3.0, y: -1.0, z: -5.0 }
  direction: { x: 0.0, y: 0.0, z: 1.0 }
  spot exponent: 0.3
  shadow quality: 0
  cutoff angle: 0.7
  parent: BODY CameraFrame

light3:
  namespace: lights/
  name: light3
  location: { x: 2.0, y: 0.0, z: 3.5 }
  direction: { x: 0, y: 0, z: -1.0 }
  spot exponent: 0.3
  shadow quality: 0
  cutoff angle: 1.4
  # parent: BODY CameraFrame

main_camera:
  namespace: cameras/
  name: main_camera
  parent: VOLUME mastoidectomy_volume 
  # parent: BODY volume_anatomical_origin

  ## ORIGINAL VOLUMETRIC DRILLING
  # location: { x: 0.0, y: 0.0, z: 0.0 }
  # look at: { x: -6.040592783505154, y: 0.0, z: 0.0 }
  # # up: {x: 0.0, y: 0.4, z: 1.0}
  # up: { x: 0.0, y: 0.0, z: 1.0 }
  # clipping plane: { near: 2.0135309278350517, far: 1006.7654639175257 }
  # field view angle: 0.17951634837990105 # so that focal length is approximately 1000px and phantom is 250 mm away

  ## SIM ASSISTED PHANTOM
  # Sim assisted phantom 1 - registered with respect to atracsys
  # location: {x: 0.06570638070827492, y: 0.6129113042119473, z: 1.1157380366288392} 
  # look at: {x: -0.00141666, y: -0.0629417, z: 1.36103}
  # up: { x: 0.0, y: 1.0, z: 0.0 }

  ## Sim assisted phantom 2 - registered with respect to base marker
  # location: {x: -0.9512750384905934, y: 0.5801295735405693, z: -0.021577704456636454 }
  # look at: { x: -0.0216465, y: 0.0155717, z: 0.0383901 }
  # up: { x: 0.0, y: 1.0, z: 0.0 }

  # Parenting to the volume.
  # Previous location 1
  # location: {x: 0.009, y: -0.72, z: -0.164 }
  # look at: { x: -0.0216465, y: 0.0155717, z: 0.0383901 }
  # up: { x: 0.86, y: 0.5, z: 0.0 }

  # location: {x: 0.00, y: -1.3, z: -0.0 }
  # look at: { x: 0.0, y: 0.0, z: 0.0 }
  # up: { x: 0.5, y: 0.0, z: -0.5 }

  location: {x: 0.692114, y: -0.00573013, z: -0.0487707 }
  look at: { x: 0.00326431, y: 0.026943, z: -0.0259858 }
  up: { x: 0.0473782, y: 0.998877, z: -5.09976e-12 }

  clipping plane: { near: 0.2, far: 1006.7654639175257 }
  field view angle: 0.17951634837990105

  monitor: 0
  # stereo: {mode: Passive, eye separation: 0.15, focal length: 200}
  # multipass: true
  visible: true
  mouse control multipliers: {pan: 0.1, rotate: 0.1, scroll: 0.1, arcball: 0.1}
  # publish image: true
  # preprocessing shaders:
  #    path: ../shaders/preprocessing/
  #    vertex: shader.vs
  #    fragment: shader.fs
  # publish image interval: 5 # Publish every nth scene update
  # publish depth: true
  # publish depth noise: {mean: 0.1, std_dev: 0.01, bias: 0.0}
  # publish depth interval: 1 # Publish every nth scene update
  publish image resolution: { width: 640, height: 480 }
  # depth compute shaders:
  #    path: ../../../ambf_shaders/depth
  #    vertex: shader.vs
  #    fragment: shader.fs

  # multipass: true

  plugins:
    [
      ## See graphics function in the multiview.cpp. The camera doesn't render by default.
      # ROS2 NOTE: Multiview plugin cannot be loaded multiple times or it will trigger seg fault.
      # Probably because of multiple nodes with same name.
      {
        name: multiview_plugin,
        filename: "libmultiview.so", # Changed plugin name to prevent loading it
        path: "build/simulation_assisted_navigation_framework/",
      }
    ]
  multiview_plugin_config:
    render_to_frame_buffer: false
    # Center-crop zoom for the 2D CT slices. Range (0.5, 1]: 1.0 shows the full
    # slice, 0.5 shows only the centered half (2x zoom) to better see segmentations.
    slice_zoom: 0.65
    # In-plane rotation of the sagittal slice, in degrees. Allowed: 0, 90, 180, -90, -180.
    sagittal_rotation: -90

cameraL:
  namespace: cameras/
  name: cameraL
  location: { x: 0.0, y: -0.3, z: 0.0 }
  look at: { x: -15.0, y: 0.0, z: 0.0 }
  up: { x: 0.0, y: 0.0, z: 1.0 }
  clipping plane: { near: 6.040592783505154, far: 1006.7654639175257 }
  field view angle: 0.0959263737541534
  monitor: 0
  # multipass: true
  publish image: true
  # visible: False
  # preprocessing shaders:
  #   path: ../../../ambf_shaders/preprocessing/
  #   vertex: shader.vs
  #   fragment: shader.fs
  publish image interval: 5 # Publish every nth scene update
  # publish depth: true
  # publish depth noise: {mean: 0.1, std_dev: 0.01, bias: 0.0}
  # publish depth interval: 1 # Publish every nth scene update
  publish image resolution: { width: 640, height: 480 }
  # depth compute shaders:
  #    path: ../../../ambf_shaders/depth
  #    vertex: shader.vs
  #    fragment: shader.fs
  parent: main_camera

cameraR:
  namespace: cameras/
  name: cameraR
  location: { x: 0.0, y: 0.3, z: 0.0 }
  look at: { x: -15.0, y: 0.0, z: 0.0 }
  up: { x: 0.0, y: 0.0, z: 1.0 }
  clipping plane: { near: 6.040592783505154, far: 1006.7654639175257 }
  field view angle: 0.0959263737541534
  monitor: 0
  # multipass: true
  # publish image: true
  # visible: False
  # preprocessing shaders:
  #   path: ../../../ambf_shaders/preprocessing/
  #   vertex: shader.vs
  #   fragment: shader.fs
  publish image interval: 5 # Publish every nth scene update
  #/publish depth: true
  # # publish depth noise: {mean: 0.1, std_dev: 0.01, bias: 0.0}
  # publish depth interval: 1 # Publish every nth scene update
  publish image resolution: { width: 640, height: 480 }
  # depth compute shaders:
  #    path: ../../../ambf_shaders/depth
  #    vertex: shader.vs
  #    fragment: shader.fs
  parent: main_camera
